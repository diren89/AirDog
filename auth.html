<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AirDog – Anmelden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..600,0..1,-25..200&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0}
  .scrl::-webkit-scrollbar{display:none}
  .scrl{scrollbar-width:none}
  .adi::placeholder{color:#aab4be}
  .adi:focus{border-color:#1f8fcf !important;background:#fff !important;outline:none}
  @keyframes floatUp{0%{transform:translateY(0)}50%{transform:translateY(-7px)}100%{transform:translateY(0)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const state = {
  mode: 'login',
  showPw: false,
  remember: true,
  terms: false
};

const A = {
  setMode(m){ state.mode = m; render(); },
  togglePw(){ state.showPw = !state.showPw; render(); },
  toggleRemember(){ state.remember = !state.remember; render(); },
  toggleTerms(){ state.terms = !state.terms; render(); }
};

function render(){
  const S = state;
  const isLogin = S.mode === 'login';

  const sel   = { bg:'#fff',         color:'#1f8fcf', shadow:'0 2px 6px rgba(20,40,60,.10)' };
  const unsel = { bg:'transparent',  color:'#8a96a2', shadow:'none' };
  const L = isLogin ? sel : unsel;
  const R = isLogin ? unsel : sel;

  const pwType = S.showPw ? 'text' : 'password';
  const pwIcon = S.showPw ? 'visibility_off' : 'visibility';

  const remBg      = S.remember ? '#1f8fcf' : '#fff';
  const remBorder  = S.remember ? '#1f8fcf' : '#cdd5dc';
  const remOpacity = S.remember ? 1 : 0;

  const termsBg      = S.terms ? '#1f8fcf' : '#fff';
  const termsBorder  = S.terms ? '#1f8fcf' : '#cdd5dc';
  const termsOpacity = S.terms ? 1 : 0;

  const switchPrompt = isLogin ? 'Noch kein Konto? ' : 'Schon registriert? ';
  const switchAction = isLogin ? 'Jetzt registrieren' : 'Anmelden';
  const switchMode   = isLogin ? 'register' : 'login';

  // Password strength bar (register only: static 2/3 for demo)
  const strengthBar = `<div style="display:flex;gap:5px;margin-bottom:18px">
    <div style="flex:1;height:4px;border-radius:3px;background:#4a9d6e"></div>
    <div style="flex:1;height:4px;border-radius:3px;background:#4a9d6e"></div>
    <div style="flex:1;height:4px;border-radius:3px;background:#d4dae0"></div>
  </div>`;

  const loginForm = `
    <div>
      <div style="font:600 22px Outfit;color:#23303d">Willkommen zurück</div>
      <div style="font:400 13px Outfit;color:#7d8995;margin-top:2px;margin-bottom:20px">Melde dich an, um weiterzulüften.</div>

      <div style="font:600 12px Outfit;color:#5b6772;margin-bottom:7px">E-Mail</div>
      <div style="position:relative;margin-bottom:16px">
        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-family:'Material Symbols Rounded';font-size:20px;color:#aab4be">mail</span>
        <input class="adi" type="email" placeholder="du@beispiel.de" style="width:100%;border:1.5px solid #e4e8ec;background:#fff;border-radius:14px;padding:14px 14px 14px 44px;font:400 14px Outfit;color:#26333f">
      </div>

      <div style="font:600 12px Outfit;color:#5b6772;margin-bottom:7px">Passwort</div>
      <div style="position:relative;margin-bottom:12px">
        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-family:'Material Symbols Rounded';font-size:20px;color:#aab4be">lock</span>
        <input class="adi" type="${pwType}" placeholder="••••••••" style="width:100%;border:1.5px solid #e4e8ec;background:#fff;border-radius:14px;padding:14px 44px 14px 44px;font:400 14px Outfit;color:#26333f">
        <span onclick="A.togglePw()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);font-family:'Material Symbols Rounded';font-size:20px;color:#93a0ac;cursor:pointer">${pwIcon}</span>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px">
        <div onclick="A.toggleRemember()" style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <div style="width:21px;height:21px;border-radius:7px;background:${remBg};border:1.5px solid ${remBorder};display:flex;align-items:center;justify-content:center;transition:all .15s">
            <span style="font-family:'Material Symbols Rounded';font-size:15px;color:#fff;font-variation-settings:'FILL' 1;opacity:${remOpacity}">check</span>
          </div>
          <span style="font:500 12.5px Outfit;color:#5b6772">Angemeldet bleiben</span>
        </div>
        <span style="font:600 12.5px Outfit;color:#1f8fcf;cursor:pointer">Vergessen?</span>
      </div>

      <div style="background:linear-gradient(140deg,#2aa6e0,#1c7ec2);color:#fff;text-align:center;font:600 15px Outfit;padding:16px;border-radius:16px;cursor:pointer;box-shadow:0 10px 22px rgba(28,126,194,.3)">Anmelden</div>
    </div>`;

  const registerForm = `
    <div>
      <div style="font:600 22px Outfit;color:#23303d">Konto erstellen</div>
      <div style="font:400 13px Outfit;color:#7d8995;margin-top:2px;margin-bottom:20px">Starte kostenlos — in 30 Sekunden.</div>

      <div style="font:600 12px Outfit;color:#5b6772;margin-bottom:7px">Name</div>
      <div style="position:relative;margin-bottom:15px">
        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-family:'Material Symbols Rounded';font-size:20px;color:#aab4be">person</span>
        <input class="adi" type="text" placeholder="Vorname" style="width:100%;border:1.5px solid #e4e8ec;background:#fff;border-radius:14px;padding:14px 14px 14px 44px;font:400 14px Outfit;color:#26333f">
      </div>

      <div style="font:600 12px Outfit;color:#5b6772;margin-bottom:7px">E-Mail</div>
      <div style="position:relative;margin-bottom:15px">
        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-family:'Material Symbols Rounded';font-size:20px;color:#aab4be">mail</span>
        <input class="adi" type="email" placeholder="du@beispiel.de" style="width:100%;border:1.5px solid #e4e8ec;background:#fff;border-radius:14px;padding:14px 14px 14px 44px;font:400 14px Outfit;color:#26333f">
      </div>

      <div style="font:600 12px Outfit;color:#5b6772;margin-bottom:7px">Passwort</div>
      <div style="position:relative;margin-bottom:8px">
        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-family:'Material Symbols Rounded';font-size:20px;color:#aab4be">lock</span>
        <input class="adi" type="${pwType}" placeholder="Mind. 8 Zeichen" style="width:100%;border:1.5px solid #e4e8ec;background:#fff;border-radius:14px;padding:14px 44px 14px 44px;font:400 14px Outfit;color:#26333f">
        <span onclick="A.togglePw()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);font-family:'Material Symbols Rounded';font-size:20px;color:#93a0ac;cursor:pointer">${pwIcon}</span>
      </div>
      ${strengthBar}

      <div onclick="A.toggleTerms()" style="display:flex;align-items:flex-start;gap:9px;cursor:pointer;margin-bottom:20px">
        <div style="width:21px;height:21px;border-radius:7px;background:${termsBg};border:1.5px solid ${termsBorder};display:flex;align-items:center;justify-content:center;transition:all .15s;flex:none;margin-top:1px">
          <span style="font-family:'Material Symbols Rounded';font-size:15px;color:#fff;font-variation-settings:'FILL' 1;opacity:${termsOpacity}">check</span>
        </div>
        <span style="font:400 12px/1.5 Outfit;color:#7d8995">Ich akzeptiere die <span style="color:#1f8fcf;font-weight:600">AGB</span> und <span style="color:#1f8fcf;font-weight:600">Datenschutzbestimmungen</span>.</span>
      </div>

      <div style="background:linear-gradient(140deg,#2aa6e0,#1c7ec2);color:#fff;text-align:center;font:600 15px Outfit;padding:16px;border-radius:16px;cursor:pointer;box-shadow:0 10px 22px rgba(28,126,194,.3)">Konto erstellen</div>
    </div>`;

  const googleLogo = `<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C12.955 4 4 12.955 4 24s8.955 20 20 20s20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"></path><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C16.318 4 9.656 8.337 6.306 14.691z"></path><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"></path><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"></path></svg>`;
  const appleLogo  = `<svg width="17" height="17" viewBox="0 0 24 24" fill="#111"><path d="M17.05 12.04c-.03-2.6 2.12-3.85 2.22-3.91-1.21-1.77-3.09-2.02-3.76-2.04-1.6-.16-3.12.94-3.93.94-.81 0-2.06-.92-3.39-.89-1.74.03-3.35 1.01-4.25 2.57-1.81 3.14-.46 7.79 1.3 10.34.86 1.25 1.88 2.65 3.22 2.6 1.29-.05 1.78-.84 3.34-.84 1.56 0 2 .84 3.37.81 1.39-.02 2.27-1.27 3.12-2.53.98-1.45 1.39-2.85 1.41-2.92-.03-.01-2.71-1.04-2.74-4.13zM14.47 4.7c.71-.87 1.19-2.07 1.06-3.27-1.02.04-2.27.68-3.01 1.54-.66.76-1.24 1.99-1.08 3.16 1.14.09 2.31-.58 3.03-1.43z"></path></svg>`;

  document.getElementById('app').innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 100% at 50% 0%,#eef1f4,#e3e7ec);padding:26px;font-family:Outfit,system-ui,sans-serif">
      <div style="width:390px;height:844px;background:#f5f6f8;border-radius:42px;overflow:hidden;position:relative;box-shadow:0 36px 80px rgba(20,35,55,.24),0 0 0 1px rgba(0,0,0,.03)">

        <!-- header gradient + brand -->
        <div style="position:relative;background:linear-gradient(168deg,#ffc478 0%,#ffd79a 26%,#fde6c5 52%,#f5f6f8 100%);padding:13px 26px 30px;overflow:hidden">
          <div style="position:absolute;top:-50px;right:-30px;width:190px;height:190px;border-radius:50%;background:radial-gradient(circle,#fff6de 0%,rgba(255,246,222,0) 70%)"></div>
          <div style="position:relative;display:flex;justify-content:space-between;align-items:center;font:600 13px Outfit;color:#7a5a2e">
            <span>14:00</span>
            <span style="display:flex;gap:6px;font-family:'Material Symbols Rounded';font-size:17px">
              <span>signal_cellular_alt</span><span>wifi</span><span>battery_full</span>
            </span>
          </div>
          <div style="position:relative;display:flex;flex-direction:column;align-items:center;margin-top:30px">
            <div style="width:74px;height:74px;border-radius:23px;background:linear-gradient(140deg,#2aa6e0,#1c7ec2);display:flex;align-items:center;justify-content:center;box-shadow:0 12px 26px rgba(28,126,194,.34);animation:floatUp 4s ease-in-out infinite">
              <span style="font-family:'Material Symbols Rounded';font-size:40px;color:#fff;font-variation-settings:'FILL' 1">pets</span>
            </div>
            <div style="font:600 27px Outfit;color:#2e2616;letter-spacing:-.5px;margin-top:14px">AirDog</div>
            <div style="font:400 13.5px Outfit;color:#8a6b3e;margin-top:2px;text-align:center">Kühle Wohnung. Glücklicher Hund.</div>
          </div>
        </div>

        <!-- scrollable content -->
        <div class="scrl" style="position:absolute;left:0;right:0;top:208px;bottom:0;overflow-y:auto;padding:0 26px 30px">

          <!-- segmented tab -->
          <div style="display:flex;background:#e9edf1;border-radius:15px;padding:4px;margin-bottom:30px">
            <div onclick="A.setMode('login')" style="flex:1;text-align:center;padding:10px 0;border-radius:11px;font:600 14px Outfit;cursor:pointer;transition:all .2s;background:${L.bg};color:${L.color};box-shadow:${L.shadow}">Anmelden</div>
            <div onclick="A.setMode('register')" style="flex:1;text-align:center;padding:10px 0;border-radius:11px;font:600 14px Outfit;cursor:pointer;transition:all .2s;background:${R.bg};color:${R.color};box-shadow:${R.shadow}">Registrieren</div>
          </div>

          ${isLogin ? loginForm : registerForm}

          <!-- divider + social -->
          <div style="display:flex;align-items:center;gap:12px;margin:22px 0">
            <div style="flex:1;height:1px;background:#e4e8ec"></div>
            <span style="font:500 11.5px Outfit;color:#aab4be">oder weiter mit</span>
            <div style="flex:1;height:1px;background:#e4e8ec"></div>
          </div>

          <div style="display:flex;gap:10px">
            <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:9px;background:#fff;border:1.5px solid #e4e8ec;border-radius:14px;padding:13px;cursor:pointer">
              ${googleLogo}
              <span style="font:600 13px Outfit;color:#37434f">Google</span>
            </div>
            <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:#fff;border:1.5px solid #e4e8ec;border-radius:14px;padding:13px;cursor:pointer">
              ${appleLogo}
              <span style="font:600 13px Outfit;color:#37434f">Apple</span>
            </div>
          </div>

          <div style="text-align:center;font:400 12.5px Outfit;color:#9aa6b2;margin-top:24px">
            <span>${switchPrompt}</span>
            <span onclick="A.setMode('${switchMode}')" style="color:#1f8fcf;font-weight:600;cursor:pointer">${switchAction}</span>
          </div>

        </div>
      </div>
    </div>`;
}

render();
</script>
</body>
</html>
