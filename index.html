<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AirDog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..600,0..1,-25..200&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0}
  .scrl::-webkit-scrollbar{display:none}
  .scrl{scrollbar-width:none}
  @keyframes scrn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(216,84,63,.30)}50%{box-shadow:0 0 0 7px rgba(216,84,63,0)}}
  @keyframes sheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  .ms{font-family:'Material Symbols Rounded'}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ---- state ----
const state = {
  // ui
  tab: 'heute', proOpen: false,
  smart: false, drink: true, rain: true,
  expanded: 'now',
  dirs: { wohn: 'S', schlaf: 'O', kueche: 'W' },
  proUnlocked: false, showAffiliate: true,

  // weather (defaults = design values; replaced on first fetch)
  time: '--:--',
  dateStr: '',
  locationName: '…',
  outdoorTemp: null,
  feelsLike: null,
  uvIndex: null,
  condition: '',
  indoorTemp: 24,       // ponytail: static assumption, no sensor
  windowClose: true,    // outdoorTemp > indoorTemp
  nextVentTime: '--:--',
  nextVentIn: '',
  ventCoolingTemp: null,
  asphaltTemp: null,
  dogWalkOk: false,
  nextDogWalkTime: '--:--',
  dogWalkIn: '',
  dogWalkAspTemp: null,
  dogWalkAirTemp: null,
  rainForecast: null,
  locOpen: false,
  locQuery: '',      // current search input text
  locResults: null,  // null=show CITIES, []=no matches, [...]=matches
  // pollen (live from air quality API)
  pollenData: [],
  pollenBadge: { bg:'#eef1f4', color:'#9aa6b2', level:'…' },
  pollenSubtitle: '…',
  // tick risk (derived from temp + humidity)
  humidity: null,
  tickLevel: 0,
};

// ---- pollen + tick helpers ----
const POLLEN_META = {
  niedrig:     { label:'Niedrig',   color:'#4a9d6e', width:'24%',  badgeBg:'#e8f4ee' },
  mittel:      { label:'Mittel',    color:'#d98a2b', width:'58%',  badgeBg:'#fbecd6' },
  hoch:        { label:'Hoch',      color:'#d8543f', width:'92%',  badgeBg:'#fce8e5' },
  'sehr hoch': { label:'Sehr hoch', color:'#a0222a', width:'100%', badgeBg:'#fce8e5' }
};
const TICK_META = [
  null,
  { label:'Niedrig',   color:'#4a9d6e', badgeBg:'#e8f4ee', sub:'Kalt · kaum Zeckenaktivität' },
  { label:'Gering',    color:'#7db855', badgeBg:'#eef6e6', sub:'Kühl · geringe Aktivität' },
  { label:'Mittel',    color:'#d98a2b', badgeBg:'#fbecd6', sub:'Mild · Zecken vereinzelt aktiv' },
  { label:'Hoch',      color:'#bf6a28', badgeBg:'#f7e3d4', sub:'Warm & feucht · ideale Bedingungen' },
  { label:'Sehr hoch', color:'#d8543f', badgeBg:'#fce8e5', sub:'Heiß & feucht · maximales Risiko' }
];
function pollenLvl(grains, thr){
  if(grains < thr[0]) return 'niedrig';
  if(grains < thr[1]) return 'mittel';
  if(grains < thr[2]) return 'hoch';
  return 'sehr hoch';
}
function tickRisk(temp, hum){
  if(temp === null || temp < 7)  return 1;
  if(temp < 15) return 2;
  if(temp >= 25 && hum >= 60) return 5;
  if(temp >= 20) return 4;
  return 3;
}

// ---- weather helpers ----
const WMO = {
  0:'Sonnig',1:'Leicht bewölkt',2:'Bewölkt',3:'Bedeckt',
  45:'Neblig',48:'Gefrierender Nebel',
  51:'Leichter Nieselregen',53:'Nieselregen',55:'Starker Nieselregen',
  61:'Leichter Regen',63:'Regen',65:'Starker Regen',
  71:'Leichter Schnee',73:'Schnee',75:'Starker Schnee',
  80:'Leichte Schauer',81:'Schauer',82:'Starke Schauer',
  95:'Gewitter',96:'Gewitter mit Hagel',99:'Starkes Gewitter'
};

function uvLabel(uv){
  if(uv<=2) return 'gering';
  if(uv<=5) return 'mäßig';
  if(uv<=7) return 'hoch';
  if(uv<=10) return 'sehr hoch';
  return 'extrem';
}

const CITIES = [
  { name:'Freiburg i. Br.', region:'Baden-Württemberg',    lat:47.9959, lon:7.8494  },
  { name:'Berlin',           region:'Berlin',               lat:52.5200, lon:13.4050 },
  { name:'München',          region:'Bayern',               lat:48.1351, lon:11.5820 },
  { name:'Hamburg',          region:'Hamburg',              lat:53.5753, lon:10.0153 },
  { name:'Köln',             region:'Nordrhein-Westfalen',  lat:50.9333, lon:6.9500  }
];

let locSearchTimer = null;
let locSearchToken = 0;
function escAttr(s){ return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

function hhmm(date){ return `${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`; }
function hh00(date){ return `${String(date.getHours()).padStart(2,'0')}:00`; }

function updateClock(){
  const now = new Date();
  state.time = hhmm(now);
  const days = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  state.dateStr = `${days[now.getDay()]}, ${now.getDate()}. ${months[now.getMonth()]}`;
  const shortDays = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  state.dateShort = `${shortDays[now.getDay()]}, ${now.getDate()}. ${months[now.getMonth()]}`;
}

async function fetchWeatherForCoords(lat, lon, locName){
  const [wRes, aRes] = await Promise.all([
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code,uv_index,relative_humidity_2m&hourly=temperature_2m,precipitation_probability&timezone=auto&forecast_days=2`),
    fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&hourly=grass_pollen,mugwort_pollen,birch_pollen&timezone=auto&forecast_days=1`)
  ]);
  const w = await wRes.json();
  const a = await aRes.json();
  state.locationName = locName;

        // current
        const cur = w.current;
        state.outdoorTemp  = Math.round(cur.temperature_2m);
        state.feelsLike    = Math.round(cur.apparent_temperature);
        state.uvIndex      = Math.round(cur.uv_index);
        state.condition    = WMO[cur.weather_code] || 'Unbekannt';
        state.windowClose  = state.outdoorTemp > state.indoorTemp;
        state.humidity     = Math.round(cur.relative_humidity_2m);

        // tick risk
        state.tickLevel = tickRisk(state.outdoorTemp, state.humidity);

        // pollen (current local hour from air quality API)
        const _p = n => String(n).padStart(2,'0');
        const _nd = new Date();
        const localHour = `${_nd.getFullYear()}-${_p(_nd.getMonth()+1)}-${_p(_nd.getDate())}T${_p(_nd.getHours())}:00`;
        const aTimes  = a.hourly?.time || [];
        const aIdx    = aTimes.indexOf(localHour);
        const grass   = aIdx >= 0 ? (a.hourly.grass_pollen[aIdx]   ?? 0) : 0;
        const mugwort = aIdx >= 0 ? (a.hourly.mugwort_pollen[aIdx] ?? 0) : 0;
        const birch   = aIdx >= 0 ? (a.hourly.birch_pollen[aIdx]   ?? 0) : 0;
        const plvls   = [pollenLvl(grass,[10,50,150]), pollenLvl(mugwort,[5,20,50]), pollenLvl(birch,[10,100,300])];
        const lvlOrd  = ['niedrig','mittel','hoch','sehr hoch'];
        const wIdx    = plvls.reduce((wi,l,i) => lvlOrd.indexOf(l) > lvlOrd.indexOf(plvls[wi]) ? i : wi, 0);
        const wMeta   = POLLEN_META[plvls[wIdx]];
        state.pollenData = ['Gräser','Beifuß','Birke'].map((name,i) => {
          const m = POLLEN_META[plvls[i]];
          return { name, label:m.label, color:m.color, width:m.width };
        });
        state.pollenBadge    = { bg:wMeta.badgeBg, color:wMeta.color, level:wMeta.label };
        state.pollenSubtitle = plvls[wIdx] === 'niedrig'
          ? 'Geringe Belastung · Wert lokal gemessen'
          : `${ ['Gräser','Beifuß','Birke'][wIdx] }-Hochsaison · Wert lokal gemessen`;

        // hourly arrays
        const hTemps  = w.hourly.temperature_2m;
        const hTimes  = w.hourly.time;
        const hPrecip = w.hourly.precipitation_probability;
        const now     = new Date();

        // next ventilation: first hour where outdoor < indoor
        let ventIdx = -1;
        for(let i=0; i<hTimes.length; i++){
          if(new Date(hTimes[i]) <= now) continue;
          if(hTemps[i] < state.indoorTemp){ ventIdx = i; break; }
        }
        if(ventIdx >= 0){
          const vt = new Date(hTimes[ventIdx]);
          state.nextVentTime     = hh00(vt);
          const diffH = Math.floor((vt-now)/3600000);
          const diffM = Math.floor(((vt-now)%3600000)/60000);
          state.nextVentIn       = diffM > 0 ? `in ${diffH} Std ${diffM} Min` : `in ${diffH} Std`;
          state.ventCoolingTemp  = Math.round(hTemps[ventIdx]);
        }

        // asphalt: sunny wmo 0-2 → ×1.5, else ×1.1
        const sunny = cur.weather_code <= 2;
        state.asphaltTemp = Math.round(state.outdoorTemp * (sunny ? 1.5 : 1.1));
        state.dogWalkOk   = state.asphaltTemp < 35;

        // next dog walk: hourly asphalt < 35°C
        let dogIdx = -1;
        for(let i=0; i<hTimes.length; i++){
          if(new Date(hTimes[i]) <= now) continue;
          const asp = Math.round(hTemps[i] * (hTemps[i] > 20 ? 1.4 : 1.1));
          if(asp < 35){ dogIdx = i; break; }
        }
        if(dogIdx >= 0){
          const dt = new Date(hTimes[dogIdx]);
          state.nextDogWalkTime = hh00(dt);
          const diffH = Math.floor((dt-now)/3600000);
          const diffM = Math.floor(((dt-now)%3600000)/60000);
          state.dogWalkIn       = diffM > 0 ? `In ${diffH} Std ${diffM} Min` : `In ${diffH} Std`;
          state.dogWalkAspTemp  = Math.round(hTemps[dogIdx] * 1.1);
          state.dogWalkAirTemp  = Math.round(hTemps[dogIdx]);
        }

        // next rain: precipitation_probability > 60%
        let rainIdx = -1;
        for(let i=0; i<hTimes.length; i++){
          if(new Date(hTimes[i]) <= now) continue;
          if(hPrecip[i] > 60){ rainIdx = i; break; }
        }
        if(rainIdx >= 0){
          const rt = new Date(hTimes[rainIdx]);
          const isToday = rt.toDateString() === now.toDateString();
          state.rainForecast = `${isToday?'Heute':'Morgen'} ${hh00(rt)} Regen erwartet`;
        } else {
          state.rainForecast = null;
        }

  updateClock();
  render();
}

async function fetchWeather(){
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(async pos => {
      try {
        const {latitude: lat, longitude: lon} = pos.coords;
        const gRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=de`);
        const g = await gRes.json();
        const addr = g.address || {};
        const city = addr.city || addr.town || addr.village || '';
        const district = addr.suburb || addr.neighbourhood || addr.quarter || '';
        await fetchWeatherForCoords(lat, lon, district ? `${city} · ${district}` : city);
        resolve();
      } catch(e){ reject(e); }
    }, reject, { timeout: 10000 });
  });
}

async function searchNominatim(query){
  const myToken = ++locSearchToken;
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&accept-language=de&countrycodes=de&limit=6&addressdetails=1`);
    const data = await res.json();
    if(myToken !== locSearchToken) return; // superseded by newer keystroke
    state.locResults = data.map(d => ({
      name: d.address?.city || d.address?.town || d.address?.village || d.address?.municipality || (d.display_name||'').split(',')[0],
      region: d.address?.state || '',
      lat: parseFloat(d.lat),
      lon: parseFloat(d.lon)
    }));
    render();
  } catch(e){ /* silent fail, keep last good list */ }
}

// ---- actions ----
const A = {
  setTab(t){ state.tab = t; render(); },
  expand(id){ state.expanded = state.expanded === id ? null : id; render(); },
  setDir(room, dir){ state.dirs = Object.assign({}, state.dirs, {[room]: dir}); render(); },
  tog(k){ state[k] = !state[k]; render(); },
  openPro(){ state.proOpen = true; render(); },
  closePro(){ state.proOpen = false; render(); },
  openLoc(){ state.locOpen = true; state.locQuery = ''; state.locResults = null; render(); },
  closeLoc(){ state.locOpen = false; render(); },
  pickCity(name, lat, lon){ state.locOpen = false; render(); fetchWeatherForCoords(lat, lon, name).catch(()=>{}); },
  useGps(){ state.locOpen = false; render(); fetchWeather().catch(()=>{}); },
  searchLoc(q){
    state.locQuery = q;
    clearTimeout(locSearchTimer);
    const query = q.trim();
    if(query.length < 2){ state.locResults = null; render(); return; }
    locSearchTimer = setTimeout(() => searchNominatim(query), 350);
  }
};

const sw = on => ({ track: on ? '#4a9d6e' : '#d4dae0', knob: on ? 'translateX(20px)' : 'translateX(2px)' });

function toggle(stateKey){
  const s = sw(state[stateKey]);
  return `<div onclick="A.tog('${stateKey}')" style="width:44px;height:26px;border-radius:20px;background:${s.track};position:relative;cursor:pointer;transition:background .2s;flex:none">
    <div style="width:22px;height:22px;border-radius:50%;background:#fff;position:absolute;top:2px;left:0;transform:${s.knob};transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.25)"></div>
  </div>`;
}

const statusBar = (color) => `<div style="display:flex;justify-content:space-between;align-items:center;font:600 13px Outfit;color:${color};padding:13px 18px 0">
  <span>${state.time}</span>
  <span style="display:flex;gap:6px" class="ms">
    <span style="font-size:17px">signal_cellular_alt</span><span style="font-size:17px">wifi</span><span style="font-size:17px">battery_full</span>
  </span>
</div>`;

// ---------------- HEUTE ----------------
function viewHeute(){
  const locked      = !state.proUnlocked;
  const proUnlocked = state.proUnlocked;

  const tempDisplay = state.outdoorTemp !== null ? `${state.outdoorTemp}°` : '…';
  const feelsStr    = state.feelsLike   !== null ? `Gefühlt ${state.feelsLike}° · UV ${state.uvIndex} ${uvLabel(state.uvIndex)}` : '';
  const aspStr      = state.asphaltTemp !== null ? `Asphalt ~${state.asphaltTemp}° · zu heiß für Pfoten` : 'Asphalt wird berechnet…';
  const dogWalkOk   = state.dogWalkOk;
  const tick        = TICK_META[state.tickLevel] || TICK_META[1];

  const reminder = locked ? `
    <div onclick="A.openPro()" style="position:relative;display:flex;align-items:center;gap:7px;margin-top:14px;background:rgba(255,255,255,.15);border-radius:13px;padding:10px 12px;cursor:pointer">
      <span class="ms" style="font-size:18px">lock</span>
      <span style="font:500 12.5px Outfit;flex:1">Pro: Erinnerung 1 Std vorher</span>
      <span class="ms" style="font-size:18px">chevron_right</span>
    </div>` : '';
  const reminderActive = proUnlocked ? `
    <div style="position:relative;display:flex;align-items:center;gap:7px;margin-top:14px;background:rgba(255,255,255,.15);border-radius:13px;padding:10px 12px">
      <span class="ms" style="font-size:18px;font-variation-settings:'FILL' 1">notifications_active</span>
      <span style="font:500 12.5px Outfit;flex:1">Erinnerung aktiv — wir melden uns ${state.nextVentTime ? (() => { const [h] = state.nextVentTime.split(':'); return `${String(+h-1).padStart(2,'0')}:30`; })() : '--:--'}</span>
      <span class="ms" style="font-size:18px;font-variation-settings:'FILL' 1">check_circle</span>
    </div>` : '';

  const ventText = state.ventCoolingTemp !== null
    ? `Lüften empfohlen — draußen kühlt auf ${state.ventCoolingTemp}°, dann wird's drinnen richtig kühl.`
    : 'Lüftzeitfenster wird berechnet…';

  const rainCard = state.rainForecast ? `
    <div style="display:flex;align-items:center;gap:11px;background:#e8edf6;border-radius:18px;padding:13px 15px">
      <span class="ms" style="font-size:24px;color:#5b78a6;font-variation-settings:'FILL' 1">rainy</span>
      <div style="flex:1">
        <div style="font:600 13px Outfit;color:#3f4f68">${state.rainForecast}</div>
        <div style="font:400 11.5px Outfit;color:#7d8aa0;margin-top:1px">Wir erinnern dich rechtzeitig, die Fenster zu schließen.</div>
      </div>
    </div>` : '';

  const affiliateCard = state.showAffiliate ? `
    <div style="background:#fff;border-radius:18px;padding:13px 15px;box-shadow:0 2px 10px rgba(25,45,65,.05);display:flex;align-items:center;gap:13px;cursor:pointer">
      <div class="ms" style="width:40px;height:40px;border-radius:12px;background:#eef1f4;display:flex;align-items:center;justify-content:center;color:#8a96a2;font-size:22px">roller_shades</div>
      <div style="flex:1">
        <div style="font:600 13px Outfit;color:#2a3742">Noch keine Rollos? Smarte ab 89 €</div>
        <div style="font:400 11px Outfit;color:#9aa6b2;margin-top:1px">Auto-Abdunkeln spart bis 4° · Anzeige</div>
      </div>
      <span class="ms" style="font-size:20px;color:#c0c8d0">chevron_right</span>
    </div>` : '';

  const windowBadge = state.windowClose
    ? `<div style="display:flex;align-items:center;gap:5px;background:rgba(216,138,43,.18);border-radius:20px;padding:6px 11px;font:600 12.5px Outfit;color:#b5701d"><span class="ms" style="font-size:16px;font-variation-settings:'FILL' 1">do_not_disturb_on</span>Fenster zu halten</div>`
    : `<div style="display:flex;align-items:center;gap:5px;background:rgba(70,154,107,.18);border-radius:20px;padding:6px 11px;font:600 12.5px Outfit;color:#2e7d52"><span class="ms" style="font-size:16px;font-variation-settings:'FILL' 1">air</span>Jetzt lüften!</div>`;

  const dogStatusDot = dogWalkOk
    ? `<div style="width:13px;height:13px;border-radius:50%;background:#469a6b"></div>`
    : `<div style="width:13px;height:13px;border-radius:50%;background:#d8543f;animation:pulse 1.8s ease infinite"></div>`;

  return `<div>
    <div style="position:relative;background:linear-gradient(168deg,#ffc478 0%,#ffd79a 28%,#fde6c5 56%,#f5f6f8 100%);padding:13px 18px 32px;overflow:hidden">
      <div style="position:absolute;top:-44px;right:-32px;width:170px;height:170px;border-radius:50%;background:radial-gradient(circle,#fff6de 0%,rgba(255,246,222,0) 70%)"></div>
      <div style="position:relative;display:flex;justify-content:space-between;align-items:center;font:600 13px Outfit;color:#7a5a2e">
        <span>${state.time}</span>
        <span style="display:flex;gap:6px" class="ms"><span style="font-size:17px">signal_cellular_alt</span><span style="font-size:17px">wifi</span><span style="font-size:17px">battery_full</span></span>
      </div>
      <div style="position:relative;display:flex;justify-content:space-between;align-items:flex-start;margin-top:14px">
        <div>
          <div onclick="A.openLoc()" style="display:inline-flex;align-items:center;gap:4px;color:#5c4a2e;font:600 14px Outfit;cursor:pointer;background:rgba(255,255,255,.4);border-radius:18px;padding:3px 9px 3px 6px"><span class="ms" style="font-size:18px;font-variation-settings:'FILL' 1">location_on</span>${state.locationName}<span class="ms" style="font-size:17px;color:#a07f4d">expand_more</span></div>
          <div style="color:#8a6b3e;font:400 12.5px Outfit;margin-top:2px">${state.dateStr}</div>
        </div>
        <div style="display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.55);border-radius:22px;padding:4px 11px 4px 5px">
          <div class="ms" style="width:26px;height:26px;border-radius:50%;background:#c0673c;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-variation-settings:'FILL' 1">pets</div>
          <span style="font:600 12.5px Outfit;color:#5c4a2e">Charlie</span>
        </div>
      </div>
      <div style="position:relative;display:flex;align-items:flex-end;gap:14px;margin-top:20px">
        <div style="font:300 76px/0.85 Outfit;color:#3a2f20;letter-spacing:-3px">${tempDisplay}</div>
        <div style="padding-bottom:9px">
          <div style="font:600 16px Outfit;color:#4a3a22">${state.condition}</div>
          <div style="font:400 13px Outfit;color:#8a6b3e;margin-top:1px">${feelsStr}</div>
        </div>
      </div>
      <div style="position:relative;display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.6);border-radius:20px;padding:6px 11px;font:500 12.5px Outfit;color:#5c4a2e"><span class="ms" style="font-size:16px">home</span>${state.indoorTemp}° innen</div>
        ${windowBadge}
      </div>
    </div>

    <div style="margin-top:-20px;background:#f5f6f8;border-radius:24px 24px 0 0;padding:20px 16px 8px;display:flex;flex-direction:column;gap:14px;position:relative">

      <div style="border-radius:22px;padding:18px;background:linear-gradient(140deg,#2aa6e0,#1c7ec2);color:#fff;box-shadow:0 10px 24px rgba(28,126,194,.30);position:relative;overflow:hidden">
        <div style="position:absolute;right:-22px;top:-26px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.10)"></div>

const KINDS = {
  open:    { accent:'#1f8fcf', bg:'#e4f2fb', icon:'air' },
  close:   { accent:'#d98a2b', bg:'#fbecd6', icon:'roller_shades' },
  heat:    { accent:'#d98a2b', bg:'#fbecd6', icon:'wb_sunny' },

};

function rawDay(){
  const out = state.outdoorTemp ?? 28;
  const ind = state.indoorTemp;
  const asp = state.asphaltTemp ?? 42;
  const nv  = state.nextVentTime || '21:30';
  const ndw = state.nextDogWalkTime || '20:30';
  const vc  = state.ventCoolingTemp ?? 19;
  const da  = state.dogWalkAirTemp ?? 23;
  const ds  = state.dogWalkAspTemp ?? 28;
  return [
    { id:'morg', kind:'open',    st:'past',     t:'05:30 – 07:30', title:'Morgenlüften',         sub:`Kühle Nachtluft · ${vc}° außen`,        detail:`Stoß- oder Querlüften für 20–30 Min. Holt die letzte kühle Luft rein, bevor die Sonne kommt.` },
    { id:'zu',   kind:'close',   st:'past',     t:'ab 08:00',      title:'Fenster zu & abdunkeln',sub:'Süd & West · Rollos runter',             detail:'Die Sonne trifft jetzt Süd- und Westfenster. Geschlossen & abgedunkelt bleibt die Wohnung bis zu 4° kühler.' },
    { id:'now',  kind:'heat',    st:'now',      t:`jetzt · ${state.time}`, title:'Hitze draußen halten', sub:`${out}° außen · ${ind}° innen`, detail:`Außen wärmer als innen — jedes offene Fenster heizt auf. Alles zu, Rollos unten. Nächstes Lüften ab ${nv}.` },
    { id:'g1',   kind:'dog',     st:'next',     t:'18:00',         title:'Gassi noch zu heiß',    sub:`Asphalt ~${asp}° · Pfoten-Risiko`,      detail:`7-Sekunden-Regel: Handrücken 7 Sek auf den Asphalt. Zu heiß für dich = zu heiß für Charlie. Lieber Schatten & kurz.` },
    { id:'g2',   kind:'dogGood', st:'upcoming', t:`ab ${ndw}`,     title:'Gute Gassi-Zeit',       sub:`Abkühlung · Pfoten safe`,               detail:`Asphalt unter ${ds}°, angenehme ${da}°. Ideal für die große Runde mit Charlie.` },
    { id:'luft', kind:'open',    st:'upcoming', t:`${nv} – 05:00`, title:'Großes Lüften',         sub:`Außen ${vc}° < innen ${ind}°`,          detail:`Jetzt kühlt die Außenluft effektiv runter. Querlüften über Nacht bringt bis zu 5° Abkühlung für morgen.` }
  ];
}

function viewVerlauf(){
  const items = rawDay().map(it => {
    const k    = KINDS[it.kind];
    const isNow  = it.st === 'now';
    const done   = it.st === 'past';
    const open   = state.expanded === it.id;
    const dot       = (done || isNow) ? k.accent : '#fff';
    const timeColor = isNow ? k.accent : '#93a0ac';
    const ring      = isNow ? ('0 0 0 1.5px ' + k.accent) : '0 1px 3px rgba(20,40,60,.05)';
    const detail    = open ? `<div style="font:400 12.5px/1.5 Outfit;color:#6b7682;margin-top:11px;padding-top:11px;border-top:1px solid #eef1f4">${it.detail}</div>` : '';
    return `<div onclick="A.expand('${it.id}')" style="display:flex;gap:13px;cursor:pointer">
      <div style="position:relative;width:22px;flex:none;display:flex;justify-content:center">
        <div style="position:absolute;top:0;bottom:0;width:2px;background:#e5e9ed"></div>
        <div style="position:relative;width:14px;height:14px;border-radius:50%;background:${dot};border:2.5px solid ${k.accent};margin-top:19px;z-index:1"></div>
      </div>
      <div style="flex:1;background:#fff;border-radius:16px;padding:13px 14px;margin-bottom:11px;box-shadow:${ring}">
        <div style="display:flex;align-items:center;gap:11px">
          <div class="ms" style="width:37px;height:37px;border-radius:11px;background:${k.bg};color:${k.accent};display:flex;align-items:center;justify-content:center;font-size:20px;font-variation-settings:'FILL' 1">${k.icon}</div>
          <div style="flex:1">
            <div style="font:600 14px Outfit;color:#26333f">${it.title}</div>
            <div style="font:400 12px Outfit;color:#83909c">${it.sub}</div>

          <div style="font:600 12px Outfit;color:${timeColor};text-align:right;white-space:nowrap">${it.t}</div>
        </div>

      </div>
    </div>`;
  }).join('');

  return `<div>
    ${statusBar('#3a4651')}
    <div style="padding:14px 18px 0">
      <div style="font:600 25px Outfit;color:#23303d">Tagesverlauf</div>
      <div style="font:400 13px Outfit;color:#7d8995;margin-top:1px">${state.dateShort || state.dateStr} · auf deine Fenster abgestimmt</div>

      <div style="display:flex;align-items:center;gap:5px;font:500 11.5px Outfit;color:#5b6772;margin-left:6px"><span style="width:9px;height:9px;border-radius:50%;background:#c0673c"></span>Hund</div>
    </div>
    <div style="padding:4px 16px 20px">
      ${items}
      <div style="text-align:center;font:400 11.5px Outfit;color:#aab4be;margin-top:2px">Tippen für Details · Zeiten passen sich live ans Wetter an</div>

    <div>
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin:0 4px 9px"><span style="font:600 12px Outfit;color:#9aa6b2;text-transform:uppercase;letter-spacing:.6px">Empfehlungen</span><span style="font:400 10.5px Outfit;color:#b5bfc8">Anzeige</span></div>
      <div style="background:#fff;border-radius:16px;box-shadow:0 2px 10px rgba(25,45,65,.05);overflow:hidden">
        ${AFFILIATE.map((a,i) => `<div style="display:flex;align-items:center;gap:13px;padding:14px;border-top:1px solid ${i?'#eef1f4':'transparent'};cursor:pointer">
          <div class="ms" style="width:40px;height:40px;border-radius:12px;background:#f1f4f7;display:flex;align-items:center;justify-content:center;color:#7d8995;font-size:22px">${a.icon}</div>
          <div style="flex:1"><div style="font:600 13.5px Outfit;color:#2a3742">${a.title}</div><div style="font:400 11.5px Outfit;color:#9aa6b2">${a.sub}</div></div>
          <div style="text-align:right"><div style="font:600 12.5px Outfit;color:#469a6b">${a.price}</div><span class="ms" style="font-size:18px;color:#c0c8d0">chevron_right</span></div>
        </div>`).join('')}
      </div>
    </div>` : '';

  return `<div>
    ${statusBar('#3a4651')}
    <div style="padding:14px 18px 0">
      <div style="font:600 25px Outfit;color:#23303d">Profil & Setup</div>
      <div style="font:400 13px Outfit;color:#7d8995;margin-top:1px">So weiß AirDog, wann gelüftet wird</div>
    </div>
    <div style="padding:16px 16px 8px;display:flex;flex-direction:column;gap:18px">
      <div>
        <div style="font:600 12px Outfit;color:#9aa6b2;text-transform:uppercase;letter-spacing:.6px;margin:0 4px 9px">Fensterrichtung pro Raum</div>
        ${rooms}
      </div>
      <div>
        <div style="font:600 12px Outfit;color:#9aa6b2;text-transform:uppercase;letter-spacing:.6px;margin:0 4px 9px">Smart Home & Hinweise</div>
        <div style="background:#fff;border-radius:16px;box-shadow:0 2px 10px rgba(25,45,65,.05);overflow:hidden">
          <div style="display:flex;align-items:center;gap:12px;padding:14px">
            <span class="ms" style="font-size:22px;color:#469a6b">window</span>
            <div style="flex:1"><div style="font:600 13.5px Outfit;color:#37434f">Smarte Fensteröffner</div><div style="font:400 11.5px Outfit;color:#9aa6b2">Automatisch öffnen & schließen</div></div>
            ${toggle('smart')}
          </div>
          <div style="height:1px;background:#eef1f4;margin:0 14px"></div>
          <div style="display:flex;align-items:center;gap:12px;padding:14px">
            <span class="ms" style="font-size:22px;color:#5b78a6">rainy</span>
            <div style="flex:1"><div style="font:600 13.5px Outfit;color:#37434f">Regen-Erinnerung</div><div style="font:400 11.5px Outfit;color:#9aa6b2">Fenster schließen, bevor's regnet</div></div>
            ${toggle('rain')}
          </div>
          <div style="height:1px;background:#eef1f4;margin:0 14px"></div>
          <div onclick="A.openPro()" style="display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer">
            <span class="ms" style="font-size:22px;color:#b5701d">notifications_active</span>
            <div style="flex:1"><div style="font:600 13.5px Outfit;color:#37434f">1 Std Vorankündigung</div><div style="font:400 11.5px Outfit;color:#9aa6b2">Vor jedem Lüften-Fenster</div></div>
            <span style="background:#fbecd6;color:#b5701d;font:700 10px Outfit;letter-spacing:.5px;padding:4px 9px;border-radius:20px">PRO</span>
          </div>
        </div>
      </div>
      <div onclick="A.openPro()" style="border-radius:20px;padding:18px;background:linear-gradient(135deg,#3b6ea5,#2a4d7a);color:#fff;cursor:pointer;box-shadow:0 10px 24px rgba(42,77,122,.28);position:relative;overflow:hidden">
        <div style="position:absolute;right:-18px;bottom:-24px;font-size:120px;color:rgba(255,255,255,.07)" class="ms">workspace_premium</div>
        <div style="position:relative;display:flex;align-items:center;gap:8px;font:700 14px Outfit"><span class="ms" style="font-size:20px;font-variation-settings:'FILL' 1">workspace_premium</span>AirDog Pro</div>
        <div style="position:relative;font:400 13px/1.45 Outfit;color:#dbe7f3;margin-top:7px">Abdunkelungs-Assistent nach Sonnenstand + Vorankündigung 1 Std vorher. Werbefrei.</div>
        <div style="position:relative;display:flex;align-items:center;gap:10px;margin-top:14px">
          <span style="background:#fff;color:#2a4d7a;font:600 13px Outfit;padding:8px 16px;border-radius:20px">Pro testen</span>
          <span style="font:400 12px Outfit;color:#bcd0e6">ab 2,99 € / Monat</span>
        </div>
      </div>
      ${affiliateSec}
      <div style="text-align:center;font:400 11px Outfit;color:#b5bfc8;padding:4px 0 2px">AirDog · v1.0 · Standort: ${state.locationName}</div>
    </div>
  </div>`;
}

// ---------------- BOTTOM NAV ----------------
function bottomNav(){
  return `<div style="position:absolute;left:0;right:0;bottom:0;height:76px;background:rgba(255,255,255,.93);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid #e9ecf0;display:flex;padding:9px 12px 16px">
    ${[['heute','Heute','wb_sunny'],['verlauf','Verlauf','calendar_today'],['hund','Hund','pets'],['profil','Profil','tune']].map(([key,label,icon]) => {
      const active = state.tab === key;
      const color = active ? '#1f8fcf' : '#9aa6b2';
      return `<div onclick="A.setTab('${key}')" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer">
        <span class="ms" style="font-size:25px;line-height:1;color:${color};font-variation-settings:'FILL' ${active?1:0}">${icon}</span>
        <span style="font:500 11px Outfit;color:${color}">${label}</span>
      </div>`;
    }).join('')}
  </div>`;
}

// ---------------- PRO SHEET ----------------
function proSheet(){
  if(!state.proOpen) return '';
  return `
    <div onclick="A.closePro()" style="position:absolute;inset:0;background:rgba(20,30,45,.48);z-index:50;animation:fadein .2s ease"></div>
    <div style="position:absolute;left:0;right:0;bottom:0;z-index:51;background:#fff;border-radius:26px 26px 0 0;padding:10px 20px 26px;animation:sheet .32s cubic-bezier(.2,.8,.2,1) both">
      <div style="width:40px;height:5px;border-radius:3px;background:#e1e5ea;margin:4px auto 16px"></div>
      <div style="display:flex;align-items:center;gap:9px">
        <div class="ms" style="width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#3b6ea5,#2a4d7a);display:flex;align-items:center;justify-content:center;color:#fff;font-size:21px;font-variation-settings:'FILL' 1">workspace_premium</div>
        <div><div style="font:700 18px Outfit;color:#23303d">AirDog Pro</div><div style="font:400 12px Outfit;color:#7d8995">Hol das Maximum aus deiner Wohnung</div></div>
      </div>
      <div style="margin-top:18px;display:flex;flex-direction:column;gap:14px">
        ${PRO_FEATURES.map(f => `<div style="display:flex;align-items:flex-start;gap:11px">
          <div class="ms" style="width:34px;height:34px;border-radius:10px;background:#e4eef8;display:flex;align-items:center;justify-content:center;color:#3b6ea5;flex:none;font-size:19px">${f.icon}</div>
          <div style="flex:1"><div style="font:600 14px Outfit;color:#26333f">${f.title}</div><div style="font:400 12px/1.4 Outfit;color:#7d8995;margin-top:1px">${f.sub}</div></div>
        </div>`).join('')}
      </div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <div style="flex:1;border:1.5px solid #e4e8ec;border-radius:14px;padding:12px;text-align:center"><div style="font:400 11px Outfit;color:#9aa6b2">Monatlich</div><div style="font:600 17px Outfit;color:#26333f;margin-top:2px">2,99 €</div></div>
        <div style="flex:1;border:1.5px solid #2a4d7a;border-radius:14px;padding:12px;text-align:center;background:#f3f7fc;position:relative"><div style="position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:#2a4d7a;color:#fff;font:600 9.5px Outfit;padding:2px 8px;border-radius:10px;white-space:nowrap">−44%</div><div style="font:400 11px Outfit;color:#5b6772">Jährlich</div><div style="font:600 17px Outfit;color:#2a4d7a;margin-top:2px">19,99 €</div></div>
      </div>
      <div onclick="A.closePro()" style="margin-top:16px;background:linear-gradient(135deg,#3b6ea5,#2a4d7a);color:#fff;text-align:center;font:600 15px Outfit;padding:15px;border-radius:16px;cursor:pointer;box-shadow:0 8px 20px rgba(42,77,122,.3)">7 Tage gratis testen</div>
      <div onclick="A.closePro()" style="text-align:center;font:500 13px Outfit;color:#9aa6b2;margin-top:13px;cursor:pointer">Vielleicht später</div>
    </div>`;
}

// ---------------- LOC SHEET ----------------
function locSheet(){
  if(!state.locOpen) return '';
  const list = state.locResults !== null ? state.locResults : CITIES;
  const rows = list.length === 0
    ? `<div style="text-align:center;padding:24px 8px;font:400 13px Outfit;color:#9aa6b2">Keine Ergebnisse für „${escAttr(state.locQuery)}"</div>`
    : list.map(c => {
        const active = state.locationName === c.name;
        const check = active ? '<span class="ms" style="font-size:21px;color:#1f8fcf">check_circle</span>' : '';
        return '<div onclick="A.pickCity(\'' + escAttr(c.name) + '\',' + c.lat + ',' + c.lon + ')" style="display:flex;align-items:center;gap:11px;padding:13px 4px;cursor:pointer;border-bottom:1px solid #f3f5f7"><span class="ms" style="font-size:20px;color:#93a0ac">location_on</span><div style="flex:1"><div style="font:600 14px Outfit;color:#26333f">' + c.name + '</div><div style="font:400 11.5px Outfit;color:#9aa6b2">' + c.region + '</div></div>' + check + '</div>';
      }).join('');
  return `
    <div onclick="A.closeLoc()" style="position:absolute;inset:0;background:rgba(20,30,45,.48);z-index:50;animation:fadein .2s ease"></div>
    <div style="position:absolute;left:0;right:0;bottom:0;z-index:51;background:#fff;border-radius:26px 26px 0 0;padding:10px 20px 26px;animation:sheet .32s cubic-bezier(.2,.8,.2,1) both;max-height:80%;display:flex;flex-direction:column">
      <div style="width:40px;height:5px;border-radius:3px;background:#e1e5ea;margin:4px auto 16px;flex:none"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex:none">
        <div style="font:700 18px Outfit;color:#23303d">Standort wählen</div>
        <span class="ms" onclick="A.closeLoc()" style="font-size:24px;color:#aab4be;cursor:pointer">close</span>
      </div>
      <div style="display:flex;align-items:center;gap:9px;background:#f1f4f7;border-radius:14px;padding:12px 14px;margin-top:14px;flex:none">
        <span class="ms" style="font-size:20px;color:#93a0ac">search</span>
        <input id="locSearchInput" type="text" autocomplete="off"
          value="${escAttr(state.locQuery)}"
          placeholder="Stadt oder PLZ suchen…"
          oninput="A.searchLoc(this.value)"
          style="border:none;background:transparent;outline:none;flex:1;font:400 14px Outfit;color:#26333f">
      </div>
      <div onclick="A.useGps()" style="display:flex;align-items:center;gap:11px;padding:13px 2px;margin-top:8px;cursor:pointer;flex:none">
        <span class="ms" style="font-size:21px;color:#1f8fcf;font-variation-settings:'FILL' 1">my_location</span>
        <span style="font:600 13.5px Outfit;color:#1f8fcf">Aktuellen Standort verwenden</span>
      </div>
      <div style="height:1px;background:#eef1f4;margin:2px 0 6px;flex:none"></div>
      <div class="scrl" style="overflow-y:auto">${rows}</div>
    </div>`;
}

// ---------------- RENDER ----------------
const VIEWS = { heute: viewHeute, verlauf: viewVerlauf, hund: viewHund, profil: viewProfil };

function render(){
  const app = document.getElementById('app');
  const active = document.activeElement;
  const wasFocused = state.locOpen && active && active.id === 'locSearchInput';
  const caret = wasFocused ? active.selectionStart : null;

  app.innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 100% at 50% 0%,#eef1f4,#e3e7ec);padding:26px;font-family:Outfit,system-ui,sans-serif">
      <div style="width:390px;height:844px;background:#f5f6f8;border-radius:42px;overflow:hidden;position:relative;box-shadow:0 36px 80px rgba(20,35,55,.24),0 0 0 1px rgba(0,0,0,.03)">
        <div class="scrl" style="height:100%;overflow-y:auto">
          ${VIEWS[state.tab]()}
          <div style="height:88px"></div>
        </div>
        ${bottomNav()}
        ${proSheet()}
        ${locSheet()}
      </div>
    </div>`;

  if(wasFocused){
    const input = document.getElementById('locSearchInput');
    if(input){ input.focus(); try{ input.setSelectionRange(caret, caret); }catch(e){} }
  }
}

// ---------------- BOOT ----------------
updateClock();
render();

// clock: update every minute
setInterval(() => { updateClock(); render(); }, 60000);

// weather: fetch now, refresh every 10 min
fetchWeather().catch(() => {
  // geolocation denied or network error — keep defaults, show '--:--'
});
setInterval(() => fetchWeather().catch(() => {}), 600000);
</script>
</body>
</html>
